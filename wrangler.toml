name = "aiclient-2-api"
main = "src/cloudflare/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 30000

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "your-kv-namespace-id"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "aiclient-storage"

[triggers]
crons = ["*/15 * * * *"]

[site]
bucket = "./static"

[build]
command = "npm run build:cf"

[dev]
port = 3000
local_protocol = "http"
